server:
  port: 8080

spring:
  application:
    name: gaokao-advisor
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/gaokao_advisor?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  redis:
    host: localhost
    port: 6379
    password: 1234

auth:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
  wechat:
    app-id: ${WECHAT_APP_ID:your-app-id}
    app-secret: ${WECHAT_APP_SECRET:your-app-secret}

ai:
  zhipu:
    api-key: ${ZHIPU_API_KEY}
    model: glm-4.5

logging:
  level:
    com.gaokao.advisor: debug
